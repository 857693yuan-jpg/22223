
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>R幣抽獎活動</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
}

.panel{
background:#2b2b2b;
padding:20px;
margin:20px auto;
width:400px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.join{background:#4CAF50;}
.login{background:#2196F3;}
.draw{background:#ff9800;}

#winner{
font-size:30px;
color:#00ff9d;
}

</style>
</head>

<body>

<h1>🎁 R幣抽獎活動</h1>

<div class="panel">

<h3>參加抽獎</h3>

<input id="playerName" placeholder="輸入 Roblox 名字">

<br>

<button class="join" onclick="join()">加入抽獎</button>

<p>目前參加人數：<span id="count">0</span></p>

</div>


<div class="panel">

<button class="login" onclick="adminLogin()">管理員登入</button>

</div>


<div class="panel" id="adminPanel" style="display:none">

<h3>管理員面板</h3>

<button class="draw" onclick="draw()">開始抽獎</button>

<h2 id="winner"></h2>

<h3>參加名單</h3>

<ul id="list"></ul>

</div>


<script>

let ADMIN_CODE="braksll857693"

let players=JSON.parse(localStorage.getItem("players"))||[]

function save(){
localStorage.setItem("players",JSON.stringify(players))
}

function update(){

document.getElementById("count").innerText=players.length

let list=document.getElementById("list")

if(!list)return

list.innerHTML=""

players.forEach(p=>{

let li=document.createElement("li")

li.innerText=p

list.appendChild(li)

})

}

function join(){

let name=document.getElementById("playerName").value

if(name==="")return

players.push(name)

document.getElementById("playerName").value=""

save()

update()

}

function adminLogin(){

let code=prompt("輸入管理員登入碼")

if(code===ADMIN_CODE){

document.getElementById("adminPanel").style.display="block"

update()

}else{

alert("登入失敗")

}

}

function draw(){

if(players.length===0){

alert("沒有人參加")

return

}

let rand=players[Math.floor(Math.random()*players.length)]

document.getElementById("winner").innerText="🎉 中獎者："+rand

}

update()

</script>

</body>
</html>
